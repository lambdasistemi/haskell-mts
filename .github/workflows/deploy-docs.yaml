name: Build and deploy documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Stage both WASM demos into docs/
        run: |
          nix --quiet build .#csmt-verify-wasm-demo -o result-demo
          nix --quiet build .#csmt-wasm-write-demo  -o result-demo-write
          mkdir -p docs/demo docs/demo-write
          cp -L result-demo/*       docs/demo/
          cp -L result-demo-write/* docs/demo-write/
          chmod -R u+w docs/demo docs/demo-write
      - run: nix --quiet develop github:paolino/dev-assets?dir=mkdocs -c mkdocs-deploy --force
